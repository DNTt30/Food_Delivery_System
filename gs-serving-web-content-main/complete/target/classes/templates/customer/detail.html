<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer - Chi tiết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/customer/home">FoodApp Customer</a>
    <div class="ms-auto">
        <a class="btn btn-sm btn-light" href="/customer/cart">Giỏ hàng</a>
    </div>
  </div>
</nav>

<div class="container" style="max-width: 800px;">
    <button class="btn btn-link mb-3" onclick="history.back()">&larr; Quay lại</button>
    <div class="card shadow-sm">
        <div class="row g-0">
            <div class="col-md-5">
                <img src="https://via.placeholder.com/400x400" class="img-fluid rounded-start h-100" style="object-fit:cover;" alt="Image">
            </div>
            <div class="col-md-7">
                <div class="card-body">
                    <h3 class="card-title">Cơm Sườn Ninh Kiều</h3>
                    <p class="text-muted">Mô tả: Cơm tấm dẻo, sườn nướng mỡ hành thơm lừng, kèm đồ chua ăn không ngán.</p>
                    <h4 class="text-danger my-3">35.000 đ</h4>
                    
                    <div class="d-flex align-items-center mb-4">
                        <label class="me-3">Số lượng:</label>
                        <input type="number" class="form-control w-25" value="1" min="1">
                    </div>
                    
                    <button class="btn btn-success w-100 mb-2">Mua ngay</button>
                    <button class="btn btn-outline-primary w-100">Thêm vào giỏ</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
