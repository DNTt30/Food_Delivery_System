<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Food Delivery System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 50px; background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-4">Chào mừng đến với hệ thống Food Delivery 🍕</h1>
        
        <div class="card mx-auto p-4" style="max-width: 500px;">
            <h4>Thông tin đăng nhập của bạn:</h4>
            <p class="mt-3"><strong>Tên đăng nhập:</strong> <span id="usernameDisplay">...</span></p>
            <p><strong>Vai trò (Role):</strong> <span id="roleDisplay" class="badge bg-primary">...</span></p>
            <button id="logoutBtn" class="btn btn-danger mt-3">Đăng xuất</button>
        </div>
    </div>

    <script>
        // Kiểm tra xem đã đăng nhập chưa
        const token = localStorage.getItem('jwt_token');
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role');

        if (!token) {
            alert('Bạn chưa đăng nhập! Đang chuyển hướng về trang chủ...');
            window.location.href = '/index.html';
        } else {
            document.getElementById('usernameDisplay').textContent = username;
            document.getElementById('roleDisplay').textContent = role;
            
            // Redirect based on role to specific actor dashboards
            setTimeout(() => {
                let lowerRole = role.toLowerCase();
                if (role.includes('ADMIN')) window.location.href = '/admin/dashboard';
                else if (role.includes('CUSTOMER')) window.location.href = '/customer/dashboard';
                else if (role.includes('RESTAURANT')) window.location.href = '/restaurant/dashboard';
                else if (role.includes('DRIVER')) window.location.href = '/driver/dashboard';
            }, 1500); // 1.5 seconds delay so they can see the welcome message
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.clear();
            window.location.href = '/index.html';
        });
    </script>
</body>
</html>
