<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Room Management - A25 Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e293b; --accent: #b59410; --bg-light: #f8fafc;
            --white: #ffffff; --text-muted: #94a3b8; --border: #e2e8f0;
        }

        body { font-family: 'Montserrat', sans-serif; background: var(--bg-light); margin: 0; padding: 40px; color: var(--primary); }
        .container { max-width: 1200px; margin: auto; background: var(--white); padding: 32px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.06); }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; border-bottom: 2px solid #f1f5f9; padding-bottom: 18px; }
        h1 { margin: 0; font-family: 'Playfair Display', serif; }

        /* Toolbar */
        .toolbar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        input, select { padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.95rem; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(181, 148, 16, 0.1); }
        input[type="text"] { width: 320px; }

        .btn { padding: 12px 22px; border-radius: 8px; font-weight: 600; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .btn-add { background: var(--accent); color: white; border: none; }
        .btn-back { background: #f1f5f9; color: var(--primary); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { padding: 14px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid #f1f5f9; text-align: left; background: #f8fafc; }
        td { padding: 16px 14px; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #fafafa; }

        .room-number { font-weight: 700; font-size: 1.1rem; }

        /* Status Badges */
        .status { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; display: inline-block; text-transform: uppercase; }
        .AVAILABLE { background: #d1fae5; color: #059669; }
        .BOOKED { background: #e0e7ff; color: #3730a3; }
        .OCCUPIED { background: #fee2e2; color: #dc2626; }
        .MAINTENANCE { background: #fef3c7; color: #d97706; }

        .actions { display: flex; gap: 12px; }
        .edit { color: var(--accent); font-weight: 700; text-decoration: none; }
        .delete { color: #ef4444; font-weight: 700; text-decoration: none; }
        .empty { text-align: center; padding: 60px; color: var(--text-muted); font-style: italic; }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>Room Management</h1>
        <a href="/index.html" class="btn btn-back">← Dashboard</a>
    </div>

    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Tìm theo số phòng hoặc loại phòng" th:value="${keyword}">

        <select id="statusFilter">
            <option value="">Tất cả trạng thái</option>
            <option value="AVAILABLE">Trống</option>
            <option value="BOOKED">Đã đặt</option>
            <option value="OCCUPIED">Đang ở</option>
            <option value="MAINTENANCE">Bảo trì</option>
        </select>

        <a th:href="@{/rooms/add}" class="btn btn-add">+ Thêm phòng</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Số phòng</th>
                <th>Loại phòng</th>
                <th>Trạng thái</th>
                <th style="text-align: right;">Thao tác</th>
            </tr>
        </thead>

        <!-- 🔥 CHỈ TBODY ĐƯỢC AJAX REPLACE -->
        <tbody id="roomBody" th:fragment="roomBody">
    <tr th:each="r : ${rooms}">
        <td th:text="${r.roomId}"></td>
        <td class="room-number" th:text="${r.roomNumber}"></td>
        
        <td th:text="${r.roomType != null ? r.roomType.typeName : 'Chưa gán loại'}"></td>

        <td>
            <span class="status" th:classappend="${r.status}" th:text="${r.status}"></span>
        </td>

        <td class="actions">
            <a th:href="@{/rooms/edit/{id}(id=${r.roomId})}" class="edit">Sửa</a>
            <a th:href="@{/rooms/delete/{id}(id=${r.roomId})}" class="delete"
               onclick="return confirm('Xóa phòng này?')">Xóa</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(rooms)}">
        <td colspan="5" class="empty">Không tìm thấy dữ liệu phòng phù hợp.</td>
    </tr>
</tbody>
    </table>
</div>

<script>
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const roomBody = document.getElementById("roomBody");

    function loadRooms() {
        // QUAN TRỌNG: Đổi keyword thành search để khớp với @RequestParam trong Controller
        const search = searchInput.value;
        const status = statusFilter.value;

        fetch(`/rooms/list?search=${encodeURIComponent(search)}&status=${status}`, {
            headers: { "X-Requested-With": "XMLHttpRequest" }
        })
        .then(res => res.text())
        .then(html => {
            // Chỉ cập nhật nội dung tbody, tránh load lại cả trang gây vỡ giao diện
            roomBody.innerHTML = html;
        })
        .catch(err => console.error("Lỗi AJAX:", err));
    }

    searchInput.addEventListener("input", loadRooms);
    statusFilter.addEventListener("change", loadRooms);
</script>

</body>
</html>
