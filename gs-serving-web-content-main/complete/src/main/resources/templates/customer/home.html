<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer - Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/customer/home">FoodApp Customer</a>
    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-sm btn-light" href="/customer/history">Lịch sử</a>
      <a class="btn btn-sm btn-light" href="/customer/cart">Giỏ hàng</a>
      <a class="btn btn-sm btn-light" href="/common/profile">Hồ sơ</a>
    </div>
  </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-8 mx-auto">
            <div class="input-group">
                <input type="text" class="form-control form-control-lg" placeholder="Tìm kiếm món ăn, quán ăn...">
                <button class="btn btn-dark">Lọc</button>
                <button class="btn btn-success px-4">Tìm kím</button>
            </div>
        </div>
    </div>

    <!-- Danh sách nhà hàng/món ăn -->
    <h4 class="mb-3">Danh sách nổi bật</h4>
    <div class="row g-4">
        <!-- Item 1 -->
        <div class="col-md-3">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Mon an">
                <div class="card-body text-center">
                    <h5 class="card-title">Cơm Sườn Ninh Kiều</h5>
                    <p class="card-text text-danger fw-bold">35.000đ</p>
                    <a href="/customer/detail" class="btn btn-outline-primary btn-sm">Xem chi tiết</a>
                </div>
            </div>
        </div>
        <!-- Item 2 -->
        <div class="col-md-3">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Mon an">
                <div class="card-body text-center">
                    <h5 class="card-title">Trà Sữa Trân Châu</h5>
                    <p class="card-text text-danger fw-bold">25.000đ</p>
                    <a href="/customer/detail" class="btn btn-outline-primary btn-sm">Xem chi tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
