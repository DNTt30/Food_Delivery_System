<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - Food Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; padding-top: 50px; }</style>
</head>
<body>
<div class="container" style="max-width: 500px;">
    <h2 class="text-center mb-4">🍕 Food Delivery</h2>
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <ul class="nav nav-tabs card-header-tabs" id="authTab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Đăng Nhập</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Đăng Ký</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="forgot-tab" data-bs-toggle="tab" data-bs-target="#forgot" type="button" role="tab">Quên MK</button>
                </li>
            </ul>
        </div>
        <div class="card-body">
            <div class="tab-content" id="authTabContent">
                <!-- Login -->
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form>
                        <div class="mb-3"><label>Tên đăng nhập / Email</label><input type="text" class="form-control"></div>
                        <div class="mb-3"><label>Mật khẩu</label><input type="password" class="form-control"></div>
                        <button type="submit" class="btn btn-primary w-100">Đăng Nhập</button>
                    </form>
                </div>
                <!-- Register -->
                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form>
                        <div class="mb-3"><label>Tên người dùng</label><input type="text" class="form-control"></div>
                        <div class="mb-3"><label>Email</label><input type="email" class="form-control"></div>
                        <div class="mb-3"><label>Mật khẩu</label><input type="password" class="form-control"></div>
                        <button type="submit" class="btn btn-success w-100">Đăng Ký</button>
                    </form>
                </div>
                <!-- Forgot Password -->
                <div class="tab-pane fade" id="forgot" role="tabpanel">
                    <form>
                        <div class="mb-3"><label>Nhập Email của bạn</label><input type="email" class="form-control"></div>
                        <button type="submit" class="btn btn-warning w-100">Gửi Liên Kết Đặt Lại</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
