<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Chung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">Quản Lý Tài Khoản</a>
    <button class="btn btn-sm btn-outline-light ms-auto me-2" onclick="history.back()">Quay Lại</button>
    <button class="btn btn-sm btn-danger" onclick="location.href='/index.html'">Đăng xuất</button>
  </div>
</nav>
<div class="container" style="max-width: 600px;">
    <h3 class="mb-3">Thông Tin Hồ Sơ</h3>
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form>
                <div class="mb-3"><label>Họ và Tên</label><input type="text" class="form-control" value="Người dùng mẫu"></div>
                <div class="mb-3"><label>Email</label><input type="email" class="form-control" value="user@example.com" disabled></div>
                <div class="mb-3"><label>Số điện thoại</label><input type="text" class="form-control" value="0987654321"></div>
                <button type="button" class="btn btn-primary">Lưu Thay Đổi</button>
            </form>
        </div>
    </div>
    <h3 class="mb-3">Đổi Mật Khẩu</h3>
    <div class="card shadow-sm">
        <div class="card-body">
            <form>
                <div class="mb-3"><label>Mật khẩu cũ</label><input type="password" class="form-control"></div>
                <div class="mb-3"><label>Mật khẩu mới</label><input type="password" class="form-control"></div>
                <div class="mb-3"><label>Xác nhận mật khẩu</label><input type="password" class="form-control"></div>
                <button type="button" class="btn btn-warning">Đổi Mật Khẩu</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
