<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer - Lịch sử</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/customer/home">FoodApp Customer</a>
  </div>
</nav>
<div class="container">
    <h4 class="mb-3">Lịch sử đơn hàng</h4>
    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>Mã đơn</th><th>Ngày đặt</th><th>Nhà hàng</th><th>Tổng tiền</th><th>Thao tác</th></tr></thead>
            <tbody>
                <tr>
                    <td>#12344</td><td>20/10/2025</td><td>Cơm Sườn Ninh Kiều</td><td>70.000 đ</td>
                    <td><button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#reviewModal">Đánh giá</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<!-- Review Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Đánh giá đơn hàng</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <label>Điểm đánh giá (1-5 sao):</label>
        <input type="number" class="form-control mb-3" min="1" max="5" value="5">
        <label>Nhận xét:</label>
        <textarea class="form-control" rows="3" placeholder="Đồ ăn rất ngon..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success">Gửi đánh giá</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
