<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer - Giỏ Hàng & Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/customer/home">FoodApp Customer</a>
  </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-7">
            <h4 class="mb-3">Giỏ hàng của bạn</h4>
            <div class="card shadow-sm mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <img src="https://via.placeholder.com/80" class="rounded me-3" alt="...">
                        <div>
                            <h6 class="mb-0">Cơm Sườn Ninh Kiều</h6>
                            <small class="text-muted">SL: 2</small>
                        </div>
                    </div>
                    <strong>70.000 đ</strong>
                    <button class="btn btn-sm btn-danger">Xóa</button>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <h4 class="mb-3">Thanh toán</h4>
            <div class="card shadow-sm p-4">
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Mã khuyến mãi (nếu có)">
                </div>
                <div class="mb-3">
                    <select class="form-select">
                        <option>Chuyển khoản / Quét mã QR</option>
                        <option>Thanh toán tiền mặt khi nhận (COD)</option>
                    </select>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-2">
                    <span>Tạm tính:</span><span>70.000 đ</span>
                </div>
                <div class="d-flex justify-content-between mb-3 text-danger fw-bold">
                    <span>Tổng cộng:</span><span>70.000 đ</span>
                </div>
                <a href="/customer/tracking" class="btn btn-success w-100">Chốt đơn & Thanh toán ngay</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
