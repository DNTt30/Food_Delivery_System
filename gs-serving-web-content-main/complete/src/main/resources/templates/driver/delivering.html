<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver - Đang giao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
  <div class="container">
    <a class="navbar-brand text-white fw-bold" href="/driver/new_orders">Driver Dashboard</a>
  </div>
</nav>

<div class="container" style="max-width: 600px;">
    <h4 class="mb-3">Đơn hàng đang xử lý</h4>
    <div class="card shadow-sm p-3">
        <h5 class="text-primary mb-3">Mã đơn: #12345</h5>
        <div class="mb-3">
            <label class="fw-bold">1. Lấy hàng tại:</label>
            <p class="mb-1">Cơm Sườn Ninh Kiều (123 Đường ABC)</p>
            <button class="btn btn-outline-primary btn-sm">Tôi đã lấy hàng</button>
        </div>
        <hr>
        <div class="mb-3">
            <label class="fw-bold text-danger">2. Giao cho khách:</label>
            <p class="mb-1">Nguyễn Văn A (SDT: 0123456789)</p>
            <p class="mb-1">456 Đường XYZ, Quận 3</p>
            <button class="btn btn-success w-100 mt-2">Hoàn Thành (Giao xong)</button>
        </div>
    </div>
</div>
</body>
</html>
