<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Khuyến mãi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-danger mb-4">
  <div class="container">
    <a class="navbar-brand text-white fw-bold" href="/admin/dashboard">Hệ Thống Admin</a>
  </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Quản lý Khuyến Mãi (Voucher)</h4>
        <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#voucherModal">+ Tạo Mã Mới</button>
    </div>
    
    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>Mã Code</th><th>Giảm giá</th><th>Hết hạn</th><th>Trạng thái</th></tr></thead>
            <tbody>
                <tr>
                    <td class="fw-bold text-danger">GIAM20K</td><td>20.000 đ</td><td>31/12/2025</td><td><span class="badge bg-success">Active</span></td>
                </tr>
                <tr>
                    <td class="fw-bold text-danger">FREESHIP</td><td>100% Phí ship</td><td>15/11/2025</td><td><span class="badge bg-success">Active</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="voucherModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Tạo Mã Giảm Giá</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <label>Mã Code</label><input type="text" class="form-control mb-2" placeholder="VD: TET2025">
        <label>Loại giảm giá</label><select class="form-select mb-2"><option>Giảm tiền mặt</option><option>Miễn phí vận chuyển</option></select>
        <label>Giá trị giảm</label><input type="number" class="form-control mb-2">
      </div>
      <div class="modal-footer"><button class="btn btn-danger w-100">Lưu Voucher</button></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
