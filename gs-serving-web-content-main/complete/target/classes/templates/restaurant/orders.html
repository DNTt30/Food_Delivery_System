<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant - Quản lý Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-warning mb-4">
  <div class="container">
    <a class="navbar-brand text-dark fw-bold" href="/restaurant/dashboard">Restaurant Portal</a>
  </div>
</nav>

<div class="container-fluid px-4">
    <div class="row">
        <!-- Đơn mới -->
        <div class="col-md-6 border-end">
            <h4 class="text-danger mb-3">🔴 Đơn Mới Tới (Cần duyệt)</h4>
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title">Mã: #12345 <span class="badge bg-danger float-end">Mới</span></h5>
                    <p class="mb-1"><strong>Khách:</strong> Nguyễn Văn A</p>
                    <p class="mb-2"><strong>Món:</strong> 2x Cơm Sườn Ninh Kiều</p>
                    <button class="btn btn-success">Nhận đơn</button>
                    <button class="btn btn-outline-danger">Từ chối</button>
                </div>
            </div>
        </div>
        <!-- Đang nấu -->
        <div class="col-md-6">
            <h4 class="text-primary mb-3">🔵 Đang chuẩn bị / Nấu</h4>
            <div class="card shadow-sm border-primary mb-3">
                <div class="card-body">
                    <h5 class="card-title">Mã: #12340</h5>
                    <p class="mb-2"><strong>Món:</strong> 1x Trà Sữa (Thêm trân châu)</p>
                    <button class="btn btn-primary w-100">Hoàn thành (Gọi Shipper)</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
